<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>Push-Up Counter PRO</title>

<script src="https://cdn.jsdelivr.net/npm/@mediapipe/pose"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils"></script>

<style>
body {
  text-align: center;
  font-family: Arial;
  background: #111;
  color: white;
}

video {
  width: 95%;
  max-width: 700px;
  border-radius: 15px;
  margin-top: 20px;
  transform: scaleX(-1);
}

h1 { font-size: 3rem; }
h2 { color: #aaa; }
h3 { color: #777; }

button {
  padding: 10px 20px;
  margin-top: 10px;
  border-radius: 10px;
  border: none;
  cursor: pointer;
  font-size: 1rem;
}
</style>
</head>
<body>

<h1>Liegestütze: <span id="count">0</span></h1>
<h2 id="highscore">Highscore: 0</h2>
<h3 id="total">Gesamt: 0</h3>

<button onclick="resetSession()">Reset aktuelle Liegestütze</button>

<video id="video" autoplay playsinline></video>

<script>
const video = document.getElementById('video');
const countEl = document.getElementById('count');
const highscoreEl = document.getElementById('highscore');
const totalEl = document.getElementById('total');

let count = 0;

// gespeicherte Werte laden
let highscore = localStorage.getItem("pushupHighscore") || 0;
let totalPushups = localStorage.getItem("totalPushups") || 0;

highscoreEl.innerText = "Highscore: " + highscore;
totalEl.innerText = "Gesamt: " + totalPushups;

// STATE
let stage = "up";
let lastRep = 0;

// Bewegung
let lastAngle = 180;
let goingUp = false;

// Glättung
let angleBuffer = [];

// Kamera starten
navigator.mediaDevices.getUserMedia({ video: true })
  .then(stream => video.srcObject = stream);

// MediaPipe
const pose = new Pose({
  locateFile: f => `https://cdn.jsdelivr.net/npm/@mediapipe/pose/${f}`
});

pose.setOptions({
  modelComplexity: 1,
  smoothLandmarks: true,
  minDetectionConfidence: 0.6,
  minTrackingConfidence: 0.6
});

pose.onResults(results => {
  if (!results.poseLandmarks) return;

  const lm = results.poseLandmarks;

  function vis(p) {
    return p.visibility !== undefined ? p.visibility : 1;
  }

  const rightAngle = getAngle(lm[12], lm[14], lm[16]);
  const rightVis = (vis(lm[12]) + vis(lm[14]) + vis(lm[16])) / 3;

  const leftAngle = getAngle(lm[11], lm[13], lm[15]);
  const leftVis = (vis(lm[11]) + vis(lm[13]) + vis(lm[15])) / 3;

  let angle = rightVis > leftVis ? rightAngle : leftAngle;

  angleBuffer.push(angle);
  if (angleBuffer.length > 6) angleBuffer.shift();

  const smoothAngle = avg(angleBuffer);
  const now = Date.now();

  goingUp = smoothAngle > lastAngle;

  // runter
  if (smoothAngle < 105) {
    stage = "down";
  }

  // hoch + zählen
  if (
    smoothAngle > 145 &&
    stage === "down" &&
    goingUp &&
    now - lastRep > 350
  ) {
    count++;
    totalPushups++;

    countEl.innerText = count;
    totalEl.innerText = "Gesamt: " + totalPushups;

    stage = "up";
    lastRep = now;

    // speichern
    localStorage.setItem("totalPushups", totalPushups);

    if (count > highscore) {
      highscore = count;
      localStorage.setItem("pushupHighscore", highscore);
      highscoreEl.innerText = "Highscore: " + highscore;
    }
  }

  lastAngle = smoothAngle;
});

// Kamera Loop
const camera = new Camera(video, {
  onFrame: async () => {
    await pose.send({ image: video });
  },
  width: 1280,
  height: 720
});
camera.start();

// Winkel berechnen
function getAngle(a, b, c) {
  const ab = { x: a.x - b.x, y: a.y - b.y };
  const cb = { x: c.x - b.x, y: c.y - b.y };

  const dot = ab.x * cb.x + ab.y * cb.y;
  const magAB = Math.sqrt(ab.x**2 + ab.y**2);
  const magCB = Math.sqrt(cb.x**2 + cb.y**2);

  return Math.acos(dot / (magAB * magCB)) * 180 / Math.PI;
}

// Durchschnitt
function avg(arr) {
  return arr.reduce((a,b)=>a+b,0) / arr.length;
}

// 🔄 RESET NUR AKTUELLE SESSION
function resetSession() {
  count = 0;
  countEl.innerText = count;
}
</script>

</body>
</html>
