<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">

<!-- 🔥 kein Zoom -->
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

<title>Push-Up Counter PRO</title>

<script src="https://cdn.jsdelivr.net/npm/@mediapipe/pose"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils"></script>

<style>
body {
  margin: 0;
  font-family: -apple-system, BlinkMacSystemFont, "San Francisco", Arial;
  background: #0f0f0f;
  color: white;
  display: flex;
  flex-direction: column;
  align-items: center;
  touch-action: manipulation;
}

/* HEADER */
.stats {
  text-align: center;
  margin-top: 25px;
}

.stats h1 {
  font-size: 3.8rem;
  margin: 8px;
}

.stats h2 {
  font-size: 1.8rem;
  color: #888;
  margin: 4px;
  font-weight: 500;
}

.stats h3 {
  font-size: 1.5rem;
  color: #777;
  margin: 4px;
}

/* VIDEO */
.video-container {
  margin-top: 25px;
  width: 100%;
  display: flex;
  justify-content: center;
}

video {
  width: 95%;
  max-width: 700px;
  border-radius: 20px;
  transform: scaleX(-1);
  box-shadow: 0 0 40px rgba(0,0,0,0.6);
}

/* BUTTON */
.controls {
  width: 100%;
  display: flex;
  justify-content: center;
  margin-top: 25px;
}

button {
  width: 85%;
  max-width: 400px;
  background: #1c1c1e;
  color: #aaa;
  border: none;
  padding: 18px 0;
  border-radius: 20px;
  font-size: 1.3rem;
  font-weight: 600;
  letter-spacing: 0.5px;
  cursor: pointer;
}

button:active {
  background: #2c2c2e;
  color: white;
}
</style>
</head>

<body>

<div class="stats">
  <h1>Liegestütze: <span id="count">0</span></h1>
  <h2 id="highscore">Highscore: 0</h2>
  <h3 id="total">Gesamt: 0</h3>
</div>

<div class="video-container">
  <video id="video" autoplay playsinline></video>
</div>

<div class="controls">
  <button onclick="resetSession()">Reset Session</button>
</div>

<script>
const video = document.getElementById('video');
const countEl = document.getElementById('count');
const highscoreEl = document.getElementById('highscore');
const totalEl = document.getElementById('total');

let count = 0;

let highscore = localStorage.getItem("pushupHighscore") || 0;
let totalPushups = localStorage.getItem("totalPushups") || 0;

highscoreEl.innerText = "Highscore: " + highscore;
totalEl.innerText = "Gesamt: " + totalPushups;

let stage = "up";
let lastRep = 0;

let lastAngle = 180;
let goingUp = false;

let angleBuffer = [];

navigator.mediaDevices.getUserMedia({ video: true })
  .then(stream => video.srcObject = stream);

const pose = new Pose({
  locateFile: f => `https://cdn.jsdelivr.net/npm/@mediapipe/pose/${f}`
});

pose.setOptions({
  modelComplexity: 1,
  smoothLandmarks: true,
  minDetectionConfidence: 0.6,
  minTrackingConfidence: 0.6
});

pose.onResults(results => {
  if (!results.poseLandmarks) return;

  const lm = results.poseLandmarks;

  function vis(p) {
    return p.visibility !== undefined ? p.visibility : 1;
  }

  const rightAngle = getAngle(lm[12], lm[14], lm[16]);
  const rightVis = (vis(lm[12]) + vis(lm[14]) + vis(lm[16])) / 3;

  const leftAngle = getAngle(lm[11], lm[13], lm[15]);
  const leftVis = (vis(lm[11]) + vis(lm[13]) + vis(lm[15])) / 3;

  let angle = rightVis > leftVis ? rightAngle : leftAngle;

  angleBuffer.push(angle);
  if (angleBuffer.length > 6) angleBuffer.shift();

  const smoothAngle = avg(angleBuffer);
  const now = Date.now();

  goingUp = smoothAngle > lastAngle;

  if (smoothAngle < 105) {
    stage = "down";
  }

  if (
    smoothAngle > 145 &&
    stage === "down" &&
    goingUp &&
    now - lastRep > 350
  ) {
    count++;
    totalPushups++;

    countEl.innerText = count;
    totalEl.innerText = "Gesamt: " + totalPushups;

    stage = "up";
    lastRep = now;

    localStorage.setItem("totalPushups", totalPushups);

    if (count > highscore) {
      highscore = count;
      localStorage.setItem("pushupHighscore", highscore);
      highscoreEl.innerText = "Highscore: " + highscore;
    }
  }

  lastAngle = smoothAngle;
});

const camera = new Camera(video, {
  onFrame: async () => {
    await pose.send({ image: video });
  },
  width: 1280,
  height: 720
});
camera.start();

function getAngle(a, b, c) {
  const ab = { x: a.x - b.x, y: a.y - b.y };
  const cb = { x: c.x - b.x, y: c.y - b.y };

  const dot = ab.x * cb.x + ab.y * cb.y;
  const magAB = Math.sqrt(ab.x**2 + ab.y**2);
  const magCB = Math.sqrt(cb.x**2 + cb.y**2);

  return Math.acos(dot / (magAB * magCB)) * 180 / Math.PI;
}

function avg(arr) {
  return arr.reduce((a,b)=>a+b,0) / arr.length;
}

function resetSession() {
  count = 0;
  countEl.innerText = count;
}
</script>

</body>
</html>
